<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repository Health Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>GitHub Repository Health Analyzer</h1>
            <p>Analyze the health and maintainability of any public GitHub repository</p>
        </header>

        <div class="search-section">
            <input type="text" id="repoInput" placeholder="Enter repository (e.g., facebook/react)" />
            <button id="analyzeBtn">Analyze Repository</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
